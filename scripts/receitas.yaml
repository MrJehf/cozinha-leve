# ============================================================
# TEMPLATE: Cadastro em Massa de Receitas - Cozinha Leve
# ============================================================
#
# COMO USAR:
#   1. Copie o bloco de uma receita e cole abaixo para adicionar novas
#   2. Preencha TODOS os campos
#   3. Para o campo "steps", use o | (pipe) e escreva markdown livremente
#   4. Para listas (ingredients, categories, subcategories), use - antes de cada item
#   5. Para imagens: coloque os arquivos .jpg/.png/.webp na pasta scripts/images/
#      nomeados como: titulo-da-receita-em-slug.jpg (ex: bolo-de-chocolate-fit.jpg)
#      OU coloque a URL direto no campo thumbnail_url
#   6. Execute: npx tsx scripts/upload_recipes.ts scripts/receitas.yaml
#   7. Para testar sem enviar: npx tsx scripts/upload_recipes.ts scripts/receitas.yaml --dry-run
#
# CATEGORIAS DISPONÍVEIS (conferir no Supabase):
#   - Jantares
#   - Almoços
#   - Café da manhã
#   - Bolos sem glutem
#   - Doces sem açucar
#   - Introdução alimentar
#   - Receitinhas para crianças
#
# SUBCATEGORIAS DISPONÍVEIS:
#   - Saudável, Vegetariano, Vegano, Sem Glúten, Sem Lactose,
#     Rápido, Doce, Salgado, Café da Manhã, Low Carb
#
# ============================================================

receitas:
  - title: "Bolo de Chocolate Fit"
    subtitle: "Fofinho, molhadinho e sem culpa"
    calories: "210 kcal"
    prep_time: "35 min"
    is_highlight: false
    video_url: "https://www.youtube.com/watch?v=XXXXX"
    # Opção 1: URL direta da imagem
    thumbnail_url: ""
    # Opção 2: Nome do arquivo na pasta scripts/images/ (sem o caminho)
    image_file: "bolo-de-chocolate-fit.jpg"
    ingredients:
      - "1 ovo"
      - "2 colheres de sopa de farinha de aveia"
      - "1 colher de sopa de cacau em pó"
      - "1 colher de sopa de adoçante culinário"
      - "1 colher de sopa de leite ou água"
      - "1 colher de café de fermento em pó"
      - "1 xícara de leite"
      - "1 colher de sopa de cacau em pó"
      - "2 colheres de sopa de adoçante culinário"
      - "1 colher de café de amido de milho"
    categories:
      - "Doces sem açucar"
    subcategories:
      - "Saudável"
      - "Doce"
      - "Vegetariano"
    steps: |
      **Bolo:**
      Misture todos os ingredientes da massa, exceto o fermento.
      Acrescente o fermento por último.
      Leve ao forno ou air fryer a 180 °C por 25 minutos.

      **Calda:**
      Leve todos os ingredientes ao fogo baixo até engrossar.
      Faça furinhos no bolo e despeje a calda por cima.

  - title: "Strogonoff Fit de Frango"
    subtitle: "Versão leve do favorito de todos"
    calories: "252 kcal"
    prep_time: "20 min"
    is_highlight: true
    video_url: ""
    thumbnail_url: ""
    image_file: "strogonoff-fit-de-frango.jpg"
    ingredients:
      - "180 g de peito de frango em cubos"
      - "Sal, páprica defumada e pimenta-do-reino"
      - "100 g de champignon"
      - "1/3 de cebola picada"
      - "2 dentes de alho picados"
      - "1 lata de milho"
      - "1 medida da lata de leite desnatado"
      - "3 colheres de sopa de ketchup"
    categories:
      - "Almoços"
      - "Jantares"
    subcategories:
      - "Saudável"
      - "Salgado"
      - "Rápido"
      - "Sem Glúten"
    steps: |
      - Doure o frango temperado até ficar bem selado e reserve.
      - Na mesma panela, refogue a cebola e o alho.
      - Adicione o milho, refogue levemente e bata com o leite no liquidificador.
      - Volte o creme à panela e cozinhe até engrossar.
      - Acrescente o frango, os cogumelos e o ketchup.
      - Misture bem e aqueça por 1–2 minutos.
